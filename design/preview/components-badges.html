<!doctype html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="_shared.css"><title>Badges & chips</title>
<style>
  body { padding: 22px 24px; }
  .row3 { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-bottom: 14px; }
  .lab { font-size: 11px; color: var(--text-muted); width: 90px; flex: none; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; }
  .pill { display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px; border-radius: 999px; font-size: 11px; font-weight: 600; }
  .live { padding: 3px 9px; border-radius: 8px; font-size: 10px; letter-spacing: 0.08em; font-weight: 700; background: #34c759; color: #fff; position: relative; }
  .live::before { content: ''; display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: #fff; margin-right: 6px; vertical-align: 1px; }
  .tag-cloud { padding: 3px 9px; border-radius: 8px; background: linear-gradient(135deg,#667eea,#764ba2); color:#fff; font-size: 11px; font-weight: 600; }
  .nav-active { padding: 4px 10px; border-radius: 8px; font-size: 11px; font-weight: 600; background: rgba(52,199,89,0.16); color: #1f8d3e; }
</style></head>
<body>
  <div class="row3"><span class="lab">Status</span>
    <span class="pill" style="background:#ecfdf5;color:#1f8d3e">已连接</span>
    <span class="pill" style="background:#fffbeb;color:#a86200">温度偏高</span>
    <span class="pill" style="background:#fef2f2;color:#a63029">离线</span>
    <span class="pill" style="background:#eff6ff;color:#1f5fb6">同步中</span>
  </div>
  <div class="row3"><span class="lab">Live · cloud</span>
    <span class="live">LIVE</span>
    <span class="tag-cloud">0531yun</span>
    <span class="tag-cloud">CLOUD ONLY</span>
  </div>
  <div class="row3"><span class="lab">Roles</span>
    <span class="pill" style="background:#e8f0fe;color:#1070e0">admin</span>
    <span class="pill" style="background:#f1f5f9;color:#475569">operator</span>
    <span class="pill" style="background:#fef2f2;color:#a63029">readonly</span>
  </div>
  <div class="row3"><span class="lab">Filter</span>
    <span class="pill" style="background:#1070e0;color:#fff">温度</span>
    <span class="pill" style="background:#fff;color:#475569;box-shadow:inset 0 0 0 1px #cbd5e1">湿度</span>
    <span class="pill" style="background:#fff;color:#475569;box-shadow:inset 0 0 0 1px #cbd5e1">光照</span>
    <span class="pill" style="background:#fff;color:#475569;box-shadow:inset 0 0 0 1px #cbd5e1">CO₂</span>
  </div>
</body></html>
