<!doctype html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"><link rel="stylesheet" href="_shared.css"><title>KPI cards</title>
<style>
  body { padding: 18px 22px; }
  .grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 12px; }
  .card {
    background: rgba(255,255,255,0.92);
    border-radius: 18px;
    padding: 14px 16px;
    box-shadow:
      inset  1px  1px 0 rgba(255,255,255,0.92),
      inset -1px -1px 0 rgba(15,23,42,0.06),
      0 4px 18px rgba(15,23,42,0.05);
  }
  .head { display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; }
  .ico {
    width: 32px; height: 32px; border-radius: 10px;
    display: grid; place-items: center;
    font-size: 14px;
    box-shadow: inset 0 0 0 1px rgba(15,23,42,0.04);
  }
  .lab { font-size: 12px; color: rgba(28,33,45,0.62); font-weight: 500; }
  .val { font-size: 26px; font-weight: 700; line-height: 1; font-variant-numeric: tabular-nums; color: rgba(22,26,38,0.94); }
  .unit { font-size: 13px; font-weight: 500; color: rgba(28,33,45,0.50); margin-left: 4px; }
  .delta { font-size: 11px; font-weight: 600; margin-top: 6px; }
  .up { color: #2f7a48; }
  .dn { color: #8b3b34; }
</style></head>
<body>
<div class="grid">
  <div class="card">
    <div class="head"><span class="lab">温度</span>
      <div class="ico" style="background:#fbf2eb;color:#d98a5b"><i class="fa-solid fa-temperature-half"></i></div>
    </div>
    <div class="val">26.4<span class="unit">°C</span></div>
    <div class="delta up">▲ 1.2 vs 1h</div>
  </div>
  <div class="card">
    <div class="head"><span class="lab">湿度</span>
      <div class="ico" style="background:#f0f4f9;color:#7e92c4"><i class="fa-solid fa-droplet"></i></div>
    </div>
    <div class="val">68.2<span class="unit">%</span></div>
    <div class="delta dn">▼ 2.0</div>
  </div>
  <div class="card">
    <div class="head"><span class="lab">光照</span>
      <div class="ico" style="background:#fbf2eb;color:#b97540"><i class="fa-solid fa-sun"></i></div>
    </div>
    <div class="val">12,480<span class="unit">lux</span></div>
    <div class="delta up">▲ 320</div>
  </div>
  <div class="card">
    <div class="head"><span class="lab">CO₂</span>
      <div class="ico" style="background:#eef5ee;color:#5c9a6f"><i class="fa-solid fa-leaf"></i></div>
    </div>
    <div class="val">412<span class="unit">ppm</span></div>
    <div class="delta up">▲ 8</div>
  </div>
</div>
</body></html>
