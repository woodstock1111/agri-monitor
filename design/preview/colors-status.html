<!doctype html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="_shared.css"><title>Status colors</title>
<style>
  body { padding: 18px 22px; }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .item { border-radius: 14px; padding: 12px 14px; box-shadow: inset 0 0 0 1px rgba(0,0,0,0.04); }
  .head { display:flex; align-items:center; gap:8px; }
  .dot { width: 14px; height: 14px; border-radius: 50%; }
  .name { font-weight: 600; font-size: 13px; }
  .hex { font-family: var(--font-mono); font-size: 11px; color: var(--text-secondary); }
  .pill { display:inline-flex; align-items:center; gap:6px; padding: 4px 10px; border-radius: 999px; font-size: 11px; font-weight: 600; margin-top: 8px; }
</style></head>
<body>
<div class="grid">
  <div class="item" style="background:#ecfdf5">
    <div class="head"><div class="dot" style="background:#34c759"></div><div class="name">Success</div></div>
    <div class="hex">#34C759 · bg #ECFDF5</div>
    <span class="pill" style="background:#34c759;color:#fff">已连接</span>
  </div>
  <div class="item" style="background:#fffbeb">
    <div class="head"><div class="dot" style="background:#ff9f0a"></div><div class="name">Warning</div></div>
    <div class="hex">#FF9F0A · bg #FFFBEB</div>
    <span class="pill" style="background:#ff9f0a;color:#fff">温度偏高</span>
  </div>
  <div class="item" style="background:#fef2f2">
    <div class="head"><div class="dot" style="background:#ff3b30"></div><div class="name">Danger</div></div>
    <div class="hex">#FF3B30 · bg #FEF2F2</div>
    <span class="pill" style="background:#ff3b30;color:#fff">离线</span>
  </div>
  <div class="item" style="background:#eff6ff">
    <div class="head"><div class="dot" style="background:#3b82f6"></div><div class="name">Info</div></div>
    <div class="hex">#3B82F6 · bg #EFF6FF</div>
    <span class="pill" style="background:#3b82f6;color:#fff">同步中</span>
  </div>
</div>
</body></html>
