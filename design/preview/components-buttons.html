<!doctype html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"><link rel="stylesheet" href="_shared.css"><title>Buttons</title>
<style>
  body { padding: 22px 24px; }
  .row3 { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin-bottom: 12px; }
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 9px 16px; border-radius: 12px; border: none; font-family: inherit; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s cubic-bezier(0.4,0,0.2,1); }
  .btn-primary { background: #1070e0; color: #fff; }
  .btn-secondary { background: #fff; color: #1070e0; box-shadow: inset 0 0 0 1px #cbd5e1; }
  .btn-danger { background: #ff3b30; color: #fff; }
  .btn-ghost { background: transparent; color: var(--text-secondary); }
  .btn-cloud { background: linear-gradient(135deg,#667eea,#764ba2); color:#fff; box-shadow: 0 4px 12px rgba(118,75,162,0.28); }
  .btn-icon { width: 36px; height: 36px; padding: 0; justify-content: center; border-radius: 10px; background: #fff; color: var(--text-secondary); box-shadow: inset 0 0 0 1px #e2e8f0; }
  .lab { font-size: 11px; color: var(--text-muted); width: 86px; flex: none; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; }
</style></head>
<body>
  <div class="row3"><span class="lab">Primary</span><button class="btn btn-primary"><i class="fa-solid fa-arrow-right-to-bracket"></i>登录</button><button class="btn btn-primary">保存</button><button class="btn btn-primary" disabled style="opacity:0.45;cursor:not-allowed">应用筛选</button></div>
  <div class="row3"><span class="lab">Secondary</span><button class="btn btn-secondary"><i class="fa-solid fa-rotate"></i>刷新</button><button class="btn btn-secondary">取消</button></div>
  <div class="row3"><span class="lab">Danger</span><button class="btn btn-danger"><i class="fa-solid fa-trash"></i>确认删除</button></div>
  <div class="row3"><span class="lab">Cloud</span><button class="btn btn-cloud"><i class="fa-solid fa-cloud-arrow-down"></i>识别并获取设备列表</button></div>
  <div class="row3"><span class="lab">Icon · ghost</span>
    <button class="btn-icon"><i class="fa-solid fa-bars"></i></button>
    <button class="btn-icon"><i class="fa-solid fa-bell"></i></button>
    <button class="btn-icon"><i class="fa-solid fa-gear"></i></button>
    <button class="btn-icon"><i class="fa-solid fa-expand"></i></button>
    <button class="btn btn-ghost">取消</button>
  </div>
</body></html>
